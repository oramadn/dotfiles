[bar]
location = "bottom"

[[bar.layout]]
monitor = "*"
left = ["clock"]
center = ["hyprland-workspaces"]
right = ["volume", "battery"]

[modules.clock]
format = "%a %b %d  %I:%M %p"


[styling]
theme-provider = "wayle"

[styling.palette]
bg       = "{{colors.background.default.hex}}"
surface  = "{{colors.surface_container.default.hex}}"
elevated = "{{colors.surface_container_high.default.hex}}"
fg       = "{{colors.on_background.default.hex}}"
fg-muted = "{{colors.on_surface_variant.default.hex}}"
primary  = "{{colors.primary.default.hex}}"
red      = "{{colors.error.default.hex}}"
yellow   = "{{colors.tertiary.default.hex}}"
green    = "{{colors.secondary.default.hex}}"
blue     = "{{colors.primary_fixed.default.hex}}"

[wallpaper]
engine-enabled = false
